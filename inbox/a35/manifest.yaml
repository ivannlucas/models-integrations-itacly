model_id: ml35_dairy_ann_cleaning_cost
sector: lacteo
nombre: "Modelo basado en algoritmos ANN para la optimización de costes de limpieza e impacto ambiental"
task_type: regression_prescriptive  # ANN predice consumo_agua_l; GA optimiza setpoints de control
framework:
  - torch==2.10.0
  - scikit-learn==1.8.0
  - pygad==3.5.0
  - joblib==1.5.3
  - numpy==2.4.1
  - pandas==3.0.0

artifacts:
  folder: models/artifacts/
  files:
    - model_ann.pt        # pesos ANN (PasteurizationANN: 8→128→64→32→1, ReLU + Dropout 0.2)
    - scaler_X.pkl        # StandardScaler ajustado sobre X_train (8 features)
    - scaler_y.pkl        # StandardScaler ajustado sobre y_train (consumo_agua_l)

inputs:
  # Variables de contexto/sensor — llegan siempre del operario o IIoT
  fixed:
    - name: temp_entrada_leche
      type: float
      unit: "°C"
      description: "Temperatura de entrada de la leche al pasteurizador"
      train_range: [3.3, 6.5]
    - name: temp_ambiente
      type: float
      unit: "°C"
      description: "Temperatura ambiente de la sala de proceso"
      train_range: [12.4, 31.8]
    - name: horas_desde_limpieza
      type: float
      unit: h
      description: "Horas de operación acumuladas desde la última limpieza (indicador de fouling)"
      train_range: [0.1, 24.0]
    - name: presion_diferencial_bar
      type: float
      unit: bar
      description: "Caída de presión diferencial en el intercambiador (indicador indirecto de fouling)"
      train_range: [0.3, 2.4]

  # Variables de control/decisión — en modo predict las da el operario;
  # en modo optimize las resuelve el GA dentro de sus rangos
  control:
    - name: temp_setpoint_leche
      type: float
      unit: "°C"
      description: "Setpoint de temperatura de leche en la zona de calentamiento"
      ga_range: [72.0, 82.0]
    - name: temp_proceso_leche
      type: float
      unit: "°C"
      description: "Temperatura de proceso real (sensor); en simulación = temp_setpoint_leche"
      ga_range: [72.0, 82.0]  # siempre igual al setpoint en la llamada del GA
    - name: temp_agua_servicio
      type: float
      unit: "°C"
      description: "Temperatura del agua de servicio de refrigeración"
      ga_range: [75.0, 92.0]
    - name: flujo_leche_lh
      type: float
      unit: "L/h"
      description: "Caudal de leche procesada"
      ga_range: [2500.0, 4500.0]

  # Campos que el servicio calcula si no los aporta el cliente
  derived_if_missing:
    temp_proceso_leche: "temp_setpoint_leche"          # iguales en inferencia/simulación
    temp_agua_servicio: "temp_proceso_leche + 10.0"    # delta medio de 10 °C por defecto

outputs:
  # Modo predict: entrada libre de los 8 features; devuelve consumo + seguridad microbiológica
  predict_inline:
    - name: consumo_agua_l
      type: float
      unit: L
      description: "Consumo de agua de refrigeración predicho para el ciclo"
    - name: pu_logrado
      type: float
      unit: "-"
      description: "Unidades de pasteurización calculadas (determinista, no predicción ANN)"
      formula: "(16 / flujo_leche_lh) * 3600 * 10**((temp_proceso_leche - 72) / 7)"

  # Modo optimize: dado el contexto fijo, el GA busca los setpoints óptimos
  optimize:
    - name: opt_temp_leche
      type: float
      unit: "°C"
      description: "Setpoint óptimo de temperatura de leche sugerido"
    - name: opt_temp_agua
      type: float
      unit: "°C"
      description: "Temperatura óptima de agua de servicio sugerida"
    - name: opt_flujo
      type: float
      unit: "L/h"
      description: "Caudal óptimo de leche sugerido"
    - name: consumo_estandar
      type: float
      unit: L
      description: "Consumo predicho con setpoints estándar (80°C leche, 88°C agua, 3500 L/h)"
    - name: consumo_optimizado
      type: float
      unit: L
      description: "Consumo predicho con los setpoints optimizados por el GA"
    - name: ahorro_l
      type: float
      unit: L
      description: "Ahorro absoluto de agua (consumo_estandar - consumo_optimizado)"
    - name: ahorro_pct
      type: float
      unit: "%"
      description: "Porcentaje de reducción de consumo respecto al baseline estándar"
    - name: pu_logrado
      type: float
      unit: "-"
      description: "Unidades de pasteurización de la solución optimizada (debe ser >= 13)"

constraints:
  pu_minimo: 13.0
  temp_setpoint_minima_celsius: 72.0
  descripcion: >
    Restricción de seguridad alimentaria (ISO 22000/HTST). Si PU < 13 o
    temp_setpoint_leche < 72 °C, el GA penaliza la solución con fitness=1e-8
    (en efecto, la descarta). El plugin debe rechazar predicciones donde estas
    condiciones se incumplan y lanzar una excepción de dominio.

# GA config (pygad, random_seed=42 — resultados deterministas)
ga_config:
  num_generations: 50
  num_parents_mating: 5
  sol_per_pop: 20
  num_genes: 3
  random_seed: 42
  gene_space:
    temp_setpoint_leche: {low: 72, high: 82}
    temp_agua_servicio: {low: 75, high: 92}
    flujo_leche_lh: {low: 2500, high: 4500}

metrics_reported:
  dataset: test_hold_out
  split: 70/15/15
  random_seed: 42
  n_samples_test: 750
  r2: 0.9932
  mae_l: 341.58
  rmse_l: 417.75
  mae_relativo_pct: 1.39
  rmse_mae_ratio: 1.22
  veredicto_kpi: APTO
  kpi_objetivo_mae_relativo_pct: 5.0
  kpi_objetivo_r2: 0.90

# 15 casos extraídos de data/splits/X_test.csv + y_test.csv + test_predictions.csv
