known_issues:
  - "requirements.txt está codificado en UTF-16LE con BOM y CRLF (caracteres con espacios entre sí).
     Normalizar a UTF-8/LF antes de usarlo en pip install o pip-audit."
  - "El modelo fue entrenado con datos sintéticos generados por simulación física; los rangos
     de entrada (temp_entrada_leche 3-7°C, temp_ambiente 12-32°C) reflejan el espacio simulado.
     Predicciones fuera de estos rangos son extrapolaciones no validadas."
  - "presion_diferencial_bar es un proxy de fouling: la memoria advierte que su comportamiento
     fuera del dominio de entrenamiento puede ser no lineal."
  - "El GA usa random_seed=42 (pygad), lo que hace las soluciones de optimización deterministas
     en el entorno del equipo de IA, pero no entre versiones distintas de pygad."
