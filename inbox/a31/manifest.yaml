known_issues:
  - "IDENTIDAD DEL MODELO: el título/carpeta ('a31-cnp-cereals-neuroevolutivo', 'técnicas
     neuroevolutivas') es herencia de la v1.x. El modelo v2.0 REALMENTE entregado es un optimizador
     de Programación Lineal determinista (PuLP/CBC). NO hay neuroevolución, NO hay algoritmo
     genético, NO hay red neuronal surrogate. La memoria (Sección 5.3 y registro de cambios v2.0)
     lo justifica explícitamente: el problema es lineal y convexo, por lo que la LP da el óptimo
     global exacto y determinista, y el surrogate + GA de la v1.x se retiran por sobreingeniería."
  - "REEMPLAZA AL PLUGIN INTEGRADO: el plugin actual app/plugins/ml31_cereals_residue_optimizer/
     corresponde al modelo surrogate v1.x (ANN + GA) que la memoria v2.0 ABANDONÓ. La integración
     debe sustituir ese plugin por el optimizador LP v2.0 descrito aquí, no ampliarlo."
  - "SIN ARTEFACTOS SERIALIZADOS: no hay .pkl/.pt/pesos. El 'modelo' es el solver LP + JSON de
     economía + configs. training.supported=false. mlflow_utils.py será obligatorio igualmente
     (regla del repo) aunque no haya reentrenamiento por usuario."
  - "DETERMINISMO TOTAL: sin semillas aleatorias; la misma config produce el mismo resultado hasta
     el último decimal. Golden cases con tolerancia muy pequeña (0.5%). El redondeo interno del
     código es a 2 decimales en la solución."
  - "SIGNO DE residue_reduction_pct: el código calcula res_red_pct = (baseline - optimizado)/baseline*100,
     que sale POSITIVO cuando hay reducción (31.18% en 2023). La memoria (Tabla 12/16) reporta el
     mismo dato con signo negativo (-31.2%, -7.4%, -7.3%) leído como 'variación'. Es el mismo
     resultado con convención de signo distinta; alinear la convención al integrar y verificar."
  - "DEPENDENCIA DE SISTEMA pdftotext (poppler-utils): solo necesaria para RECONSTRUIR el CSV desde
     los PDFs de data/raw/. Con el CSV procesado presente (data/processed/) no se usa. En el entorno
     local WSL puede no estar disponible; incluir el CSV procesado como fixture evita el problema."
  - "DATASET: sin año 2020 (PDF corrupto). Prod_Grano_t tiene ceros/huecos 2011-2015 pero el
     optimizador NO la usa (recalcula producción con Sup_*×Rend_*). reference_year inexistente en
     los datos cae silenciosamente al último año disponible (posible fuente de confusión al verificar)."
  - "requirements.txt en ASCII/UTF-8 correcto (verificado con `file`): NO presenta el problema
     UTF-16LE de otros modelos. PuLP==3.3.2 trae CBC embebido."
  - "El estudio de Pareto configuró num_points=20 pero produjo 19 puntos no dominados (el punto al
     100% del beneficio máximo resulta infactible/dominado bajo la banda ±25% y el mínimo de tierra).
     Los golden cases de Pareto usan índices 0-18 sobre esos 19 puntos."
