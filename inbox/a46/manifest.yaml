known_issues:
  - >
    DISCREPANCIA MAYOR memoria vs. artefactos entregados (confirmada con el usuario, decisión: usar
    artefactos reales como fuente de verdad para este manifest). La memoria v1.2 (secciones 3.1, 3.5,
    9.4, Tabla 2) documenta un dataset de 100 activos / 2.200 ciclos / 2.288.800 filas con split
    60/20/20 activos. Los artefactos realmente entregados en inbox/a46/codigo/ (config.yaml,
    data/processed/generation_metadata.json, data/splits/asset_split_report.json,
    models/artifacts/model_manifest.json) corresponden a una ejecución de 10 activos / 18 ciclos por
    activo / 198.615 filas, con split 6 train (asset_01,02,03,05,07,09) / 2 val (asset_04,asset_08) /
    2 test (asset_00,asset_06). Las métricas de test reales son peores que las reportadas en la memoria
    (p.ej. tte_foul_mae_min real=69.3 min vs. memoria=32.6 min; ttu_mae_min real=109.6 min vs.
    memoria=45.0 min). Recomendado: pedir al equipo de IA que reconcilie memoria y código, o entregue
    la ejecución de 100 activos que la memoria describe.
  - >
    Tabla 14/15 de la memoria indica batch_size=128 y épocas=4 para el escenario final. El
    training_config.json realmente persistido dice batch_size=64 y epochs=8. Se ha usado el valor
    persistido real en training.hyperparams.
  - >
    La memoria referencia varios artefactos que no existen en el paquete de código entregado:
    models/artifacts/inference_input_contract.json, artifact_contract.json, kpi_design_definition.json,
    models/metrics/stats/qc/sequence_diversity_qc.json y otros ficheros bajo models/metrics/stats/qc/.
    No se ha podido verificar su contenido; el manifest se apoya únicamente en el código y los
    artefactos presentes en el paquete.
  - >
    requirements.txt no fija versiones exactas (usa >=), documentado también por el propio equipo de
    IA como limitación conocida en README.md ("no se han fijado versiones exactas... porque los
    scripts fuente no incluían un entorno bloqueado"). El encoding del fichero es ASCII/UTF-8 normal,
    sin el problema de UTF-16LE visto en otros modelos del repo.
  - >
    Dataset 100% sintético: generado internamente por src/data_processing/synthetic_generator.py, sin
    ETL de datos reales de planta (confirmado en README.md y memoria secciones 3.2 y 10). Cualquier
    cifra de negocio derivada de este modelo debe llevar advertencia de validación pendiente frente a
    telemetría real.
  - >
    El "input funcional" del modelo es una ventana temporal de 120 pasos por activo/ciclo/secuencia, no
    una fila tabular aislada. Los golden_cases referencian la ventana por (asset_id, sequence_id,
    window_end_timestamp) contra data/splits/test_rows.csv en vez de embeber 120 filas crudas por caso
    en este YAML; el skill de verification deberá reconstruir la ventana desde ese CSV para ejecutar el
    plugin end-to-end.
  - >
    OMISIÓN REAL en la Tabla 9 de la memoria (contrato de entrada productiva): no menciona
    last_maintenance_type, pero es una de las 76 features no_clock (one-hot lastmaint_*), calculada
    normalmente por align_future_labels() a partir del historial de mantenimientos y NO recalculada en
    predict.py (que asume que ya viene en el CSV de entrada, como ocurre con telemetry_processed.csv y
    con data/splits/test_rows.csv). Si no se aporta, load_telemetry() la rellena con "none" para todas
    las filas, lo que se verificó experimentalmente que desvía severity ~8% y las probabilidades raras
    (p_foul_h, p_clog_h) en >100% relativo para un caso de prueba real. Se ha añadido a
    inputs.optional del plugin como corrección; el equipo de IA debería actualizar la memoria.
  - >
    Reproducibilidad numérica verificada por capas: se comparó el tensor de entrada (120x76) construido
    por el plugin vendorizado contra el construido por el código original sin modificar (inbox/a46/codigo)
    para el golden case caso_001 — diferencia máxima 0.0 (bit-exacto). Ejecutando predict_batch() sobre
    data/splits/test_rows.csv completo, los 13 golden_cases reproducen los valores de
    no_clock_test_window_predictions.csv con diferencia absoluta <= 1.2e-9 (ruido de float32). En modo
    predict_inline (una sola ventana), la reproducción exacta depende de aportar last_maintenance_type
    y, para activos no vistos en entrenamiento, suficiente historial previo (ver
    inputs.window.baseline_history_note) — con ambos aportados, la diferencia también baja a ~1e-6.
  - >
    El split de test real solo contiene 2 activos (asset_00, asset_06) de 10 totales. La cobertura
    estadística de metrics_reported es limitada frente a lo que la memoria sugiere (20 activos de
    test); tratar las métricas de test como indicativas, no como validación robusta.
  - >
    El escenario servido es fijo: no_clock (seleccionado por mayor KPI de validación real: 1.954 vs.
    el objetivo del escenario full). El escenario "full" (con relojes directos) queda como alternativa
    en scenarios/full/best_model.pt pero no se sirve por defecto; no se ha incluido como opción
    configurable en outputs porque el código de predict.py solo expone --scenario auto/full/no_clock a
    nivel CLI, no como parámetro documentado en la memoria para producción.
