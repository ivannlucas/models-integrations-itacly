# 13 casos extraídos de data/predictions/no_clock_test_window_predictions.csv (escenario no_clock,
# selected_scenario real, split test). expected = salida del modelo (pred_*), NO el true_* — se verifica
# reproducibilidad numérica del checkpoint, no acierto del modelo frente a la verdad sintética (eso ya
# está en metrics_reported). El "input" referencia la ventana de 120 filas (asset_id+sequence_id+
# timestamp final) en data/splits/test_rows.csv en vez de embeber 120 filas crudas en este YAML — ver
# known_issues. raw_snapshot son solo columnas de contexto de la ÚLTIMA fila de la ventana, útiles para
# lectura humana, no suficientes por sí solas para reproducir la predicción.
#
# VERIFICACIÓN RECOMENDADA: usar predict_batch() sobre data/splits/test_rows.csv completo (o el CSV
# reconstruido de la ventana + historial del activo) — tolerance float_rtol=1e-4 se cumple ampliamente
# (diferencia real observada <= 1.2e-9). Si se verifica vía predict_inline (ventana única), aportar
# last_maintenance_type y, para asset_00/asset_06 (no vistos en entrenamiento), el historial completo
# del activo hasta window_end_timestamp — no solo 120 filas — o la tolerancia no se cumplirá (ver
