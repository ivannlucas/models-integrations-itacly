model_id: ml46_dairy_fouling_clog_detection
sector: lacteo
nombre: "Diseño y entrenamiento de un modelo DNSL para detectar incrustaciones y atascos en la maquinaria del procesado de la leche"
task_type: timeseries_multitask  # TCN causal multisalida: regresión (severidad, TTE/TTU) + clasificación (stage, 3 binarias) sobre ventanas de 120 pasos
framework:
  - numpy>=1.23
  - pandas>=1.5
  - matplotlib>=3.6
  - scikit-learn>=1.1
  - torch>=2.0
  - PyYAML>=6.0
  # requirements.txt no fija versiones exactas (>=); ver known_issues.

artifacts:
  folder: models/artifacts/
  files:
    - selected_model.pt          # copia del checkpoint del escenario seleccionado (no_clock)
    - model_manifest.json        # contrato: escenario, checkpoint, métricas, hashes
    - feature_artifacts.json     # medianas/IQR/baselines por activo, pesos de clase, listas de features (full=82, no_clock=76)
    - training_config.json       # TrainConfig persistida (hiperparámetros reales de esta ejecución)
    - scenarios/no_clock/best_model.pt   # checkpoint real usado en inferencia (selected_scenario = no_clock)
    - scenarios/full/best_model.pt       # alternativa conservadora (no seleccionada, no se sirve por defecto)
  extra_files_metrics:
    # necesario para reproducir la política de alertas del escenario servido; si falta, predictor.py cae a default_policy(train_cfg)
    - models/metrics/no_clock_policy_thresholds.json

inputs:
  # Mínimo técnico común (Tabla 9 de la memoria, verificado contra src/predict/predictor.py::load_telemetry
  # y src/training/data.py::load_telemetry — son obligatorios de facto porque el resto de columnas de esta
  # lista se usan directamente en feature engineering sin default numérico si faltan).
  fixed:
    - name: timestamp
      type: datetime
      description: "Marca temporal de cada muestra, ordenable y consistente por activo."
    - name: asset_id
      type: string
      description: "Identificador estable del activo/intercambiador."
    - name: flow_kg_s
      type: float
      unit: "kg/s"
    - name: pressure_in_kPa
      type: float
      unit: kPa
    - name: pressure_out_kPa
      type: float
      unit: kPa
    - name: dP_kPa
      type: float
      unit: kPa
      description: "Pérdida de carga; debe ser coherente con pressure_in/out."
    - name: Th_in_C
      type: float
      unit: "°C"
    - name: Tc_in_C
      type: float
      unit: "°C"
    - name: Th_out_C
      type: float
      unit: "°C"
    - name: Tc_out_C
      type: float
      unit: "°C"
    - name: Twall_C
      type: float
      unit: "°C"
    - name: vibration_mm_s
      type: float
      unit: "mm/s"
    - name: flow_sp_kg_s
      type: float
      unit: "kg/s"
      description: "Consigna de caudal."
    - name: Th_sp_C
      type: float
      unit: "°C"
    - name: Tc_sp_C
      type: float
      unit: "°C"
    - name: protein_g_L_nominal
      type: float
      unit: "g/L"
    - name: fat_g_L_nominal
      type: float
      unit: "g/L"
    - name: solids_g_L_nominal
      type: float
      unit: "g/L"
    - name: Ca_mM_nominal
      type: float
      unit: mM
    - name: PO4_mM_nominal
      type: float
      unit: mM
    - name: pH_nominal
      type: float
      unit: pH

  recommended:
    - name: phase
      type: categorical
      values: [production, CIP_alkaline, CIP_acid, idle, maintenance]
      description: "Delimita producción, CIP, idle y mantenimiento. Sin ella se asume production por defecto (ensure_columns)."
    - name: maintenance_active
      type: boolean
      description: "Indicador de mantenimiento activo; sin ella se asume 0."

  optional:
    - asset_family      # standard_phe | robust_phe | compact_phe | unknown — default "unknown"
    - milk_type          # whole | semi_skim | skim | high_solids | none — default "none"
    - maintenance_type    # default "none"
    - ambient_T_C
    - ambient_RH_pct
    - batch_thermal_history_factor
    - last_maintenance_type
      # none | scheduled_CIP | CIP_extra | unclog | mechanical_clean | other — default "none".
      # NO aparece en la Tabla 9 de la memoria (omisión real detectada durante la integración),
      # pero SÍ es una de las 76 features no_clock (one-hot lastmaint_*). Sin ella, todas las
      # filas se codifican como "none" y las predicciones se desvían de forma medible (verificado
      # empíricamente: severity ~8% off, p_foul_h >100% off en un caso de prueba). Ver known_issues.

  full_scenario_only:
    # Solo necesarios si en el futuro se sirve el escenario "full" (hoy no se sirve; el seleccionado es no_clock)
    - batch_elapsed_min
    - time_since_last_cip_min
    - time_since_last_maintenance_min

  prohibited:
    # Variables oráculo/objetivo del simulador — nunca deben aceptarse como entrada productiva (fuga de información).
    - Rf_m2K_W
    - deposit_mass_kg
    - m_total_kg_m2
    - m_org_kg_m2
    - m_min_kg_m2
    - Rf_org_m2K_W
    - Rf_min_m2K_W
    - UA_W_K
    - Q_W
    - fouling_stage
    - fouling_stage_physical
    - fouling_stage_name
    - fouling_onset_event
    - clog_event
    - clog_onset_event
    - foul_score
    - fouling_onset_within_30min
    - clog_onset_within_15min
    - unplanned_event_within_60min
    - unplanned_fouling_within_120min
    - time_to_fouling_onset_min
    - time_to_clog_onset_min
    - time_to_unplanned_fouling_min
    - ttm_to_unplanned_event_min
    - ttm_to_planned_cip_min
    - fault_type
    - planned_event_type
    - maintenance_planned
    - rf_stage_thr_incipient
    - rf_stage_thr_advanced

  window:
    # El input funcional NO es una fila aislada: es una ventana temporal por asset_id + cycle_id + sequence_id.
    seq_len: 120        # pasos (minutos, dt=60s)
    stride: 5            # pasos entre ventanas consecutivas en modo batch
    receptive_field_steps: 125   # campo temporal teórico del TCN (5 bloques, dilataciones 1/2/4/8/16, kernel 3)
    note: >
      predict() batch construye las ventanas internamente a partir de un CSV de telemetría ordenado
      por asset_id/timestamp (src/predict/predictor.py::_prepare_sequences + make_sequences). No existe
      en el código entregado un modo de predicción de "una sola fila"; el mínimo operativo real es
      un historial continuo de al menos 120 minutos por activo.
    baseline_history_note: >
      Para activos NO vistos en entrenamiento (todo activo de producción real, y los propios
      asset_00/asset_06 de test), los residuos (resid_flow_kg_s, resid_dP_kPa, resid_vibration_mm_s,
      resid_thermal_eff_proxy) se calculan con estimate_prefix_baseline(): una media de las primeras
      baseline_prefix_hours=8h (480 filas @1min) del historial del activo, en vez del baseline fijo
      que sí existe para los 6 activos de entrenamiento (train_asset_baselines en
      feature_artifacts.json). Verificado empíricamente: con solo la ventana de 120 min el severity
      predicho se desvía ~8% del valor real del checkpoint; aportando el historial completo del
      activo (>= 8h) la predicción coincide con precisión de float32 (~1e-6). Para máxima fidelidad
      en producción, el adaptador debe alimentar el mayor histórico disponible del activo, no solo
      los 120 minutos mínimos.

outputs:
  predict_inline:
    # Una fila de salida por ventana válida (última posición de cada ventana de 120 pasos).
    - name: pred_severity
      type: float
      description: "Severidad física de ensuciamiento actual, desescalada a Rf_m2K_W."
    - name: pred_stage
      type: int
      values: [0, 1, 2]
      description: "Estado físico: 0=stable, 1=incipient, 2=advanced."
    - name: pred_stage_name
      type: string
      values: [stable, incipient, advanced]
    - name: p_stage0
      type: float
    - name: p_stage1
      type: float
    - name: p_stage2
      type: float
    - name: p_foul_h
      type: float
      alias: p_watch_fouling
      description: "Probabilidad de inicio de ensuciamiento en 30 min."
    - name: p_actionable_foul_h
      type: float
      alias: p_actionable_fouling
      description: "Probabilidad de ensuciamiento no planificado en 120 min."
    - name: p_clog_h
      type: float
      description: "Probabilidad de inicio de obstrucción en 15 min."
    - name: pred_tte_foul_min
      type: float
      description: "Tiempo estimado hasta inicio de ensuciamiento (cap 240 min)."
    - name: pred_tte_clog_min
      type: float
      description: "Tiempo estimado hasta inicio de obstrucción (cap 120 min)."
    - name: pred_ttu_min
      type: float
      description: "Tiempo estimado hasta próxima intervención no planificada (cap 360 min)."

  alerts:
    # Episodios consolidados (evaluation.py::consolidate_alerts) — agregación operativa sobre predict_inline.
    - alert_episode_id
    - is_alert_episode
    - n_signals
    - predicates: [HighDP, LowFlow, HighVib, ThermalDrop, DPRising, VibSpike]
      description: "Predicados explicativos legibles combinados con probabilidades/severidad/tiempos."

training:
  supported: true
  target_column: Rf_m2K_W  # TrainConfig.severity_col; exigido explícitamente por load_telemetry(require_targets=True)
  required_columns:
    # Columnas mínimas que hacen fallar load_telemetry() si faltan (ValueError explícito):
    hard_required: [timestamp, asset_id, Rf_m2K_W]
    # Resto del contrato "fixed" de arriba: recomendado con fuerza para reproducir fielmente el entrenamiento
    # documentado (sin ellas, ensure_columns/feature engineering usa defaults/NaN y degrada las features).
    recommended: [flow_kg_s, pressure_in_kPa, pressure_out_kPa, dP_kPa, Th_in_C, Tc_in_C, Th_out_C, Tc_out_C,
                  Twall_C, vibration_mm_s, flow_sp_kg_s, Th_sp_C, Tc_sp_C, protein_g_L_nominal, fat_g_L_nominal,
                  solids_g_L_nominal, Ca_mM_nominal, PO4_mM_nominal, pH_nominal, phase, maintenance_active]
    source: codigo_entrenamiento  # src/training/data.py::load_telemetry
  hyperparams:
    # Valores REALES persistidos en models/artifacts/training_config.json (no los de la Tabla 15 de la
    # memoria, que no coinciden — ver known_issues).
    batch_size: 64
    epochs: 8
    lr: 0.001
    weight_decay: 0.00001
    seed: 7
    channels: 64
    dilations: [1, 2, 4, 8, 16]
    dropout: 0.15
    seq_len: 120
    stride: 5
    fouling_horizon_min: 30
    clog_horizon_min: 15
    unplanned_fouling_horizon_min: 120
    tte_fouling_cap_min: 240
    tte_clog_cap_min: 120
    ttu_cap_min: 360
    baseline_prefix_hours: 8.0
    match_window_min: 240
    split_trials: 3000
    policy_max_candidates: 400
    ablate_clocks: true
    cooldown_min_default: 60
    source: codigo_entrenamiento  # models/artifacts/training_config.json (persistido por train_pipeline)
  metrics_returned:
    - severity_rmse
    - severity_mae
    - stage_accuracy
    - stage_macro_f1
    - stage_balanced_accuracy
    - watch_foul_auc
    - watch_foul_ap
    - watch_foul_f1
    - actionable_foul_auc
    - actionable_foul_ap
    - actionable_foul_f1
    - clog_h_auc
    - clog_h_ap
    - clog_h_f1
    - tte_foul_mae_min
    - tte_clog_mae_min
    - ttu_mae_min
  note: >
    train() (src/main.py::train -> src/training/pipeline.py::train_pipeline) reentrena AMBOS escenarios
    (full y no_clock) desde cero sobre el CSV de telemetría de entrada — reparte activos en train/val/test,
    reajusta feature_artifacts, entrena las 8 épocas y reselecciona el escenario ganador por KPI de
    validación. No es fine-tuning incremental sobre el checkpoint existente.

constraints:
  scenario_selected: no_clock  # fijo; el checkpoint servido es scenarios/no_clock/best_model.pt, no configurable por request
  prohibited_input_columns: true  # ver inputs.prohibited — el plugin debe rechazar/ignorar estas columnas si llegan en un CSV de predict
  descripcion: >
    No hay una restricción de negocio tipo "rechazar predicción si X" (no hay umbral de seguridad
    alimentaria como en a35). La única restricción dura es de integridad de datos: las columnas oráculo
    listadas en inputs.prohibited nunca deben usarse como entrada productiva porque son el propio target
    del simulador (fuga de información). El plugin-integration debe decidir si esto justifica una excepción
    de dominio dedicada o basta con validación de esquema en el adaptador de entrada.

