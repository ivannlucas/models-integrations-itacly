known_issues:
  - "DISCREPANCIA memoria/README vs artefacto entregado en KPIs del GA: la memoria v2.0
     (Tabla 10) y el README citan mejora de consumo específico 10.73%, ahorro absoluto 1.48%,
     delta caudal +9.72% y tiempo medio ~723 ms/escenario; el
     models/metrics/evaluation_rt_backtesting_report.json entregado reporta 11.73%, 1.78%,
     +10.62% y 416.5 ms. Son dos runs distintos (la propia memoria advierte variación ~1%
     CPU vs CUDA). Decisión del propietario (2026-07-10): el artefacto entregado es la fuente
     de verdad para metrics_reported; la ficha técnica debe citar ambas cifras con nota.
     Las métricas del MLP sí coinciden exactamente entre memoria, README y train_metrics.json."
  - "Todo el dataset es sintético (simulador físico V3.4, seed=1). Las cifras de negocio
     (mejora 11.73%, cumplimiento 100%) están calculadas sobre datos simulados y requieren
     validación Sim2Real con datos reales de planta antes de cualquier despliegue — la propia
     memoria lo declara como limitación principal."
  - "Determinismo del GA: reproducible por escenario con seed = seed_base + indice_de_fila
     (seed_base=1, random + numpy). La reproducción bit a bit de los setpoints depende de las
     versiones de deap/python y de diferencias float de plataforma (el MLP surrogate puede
     variar ~1e-5 entre BLAS); por eso los golden cases de optimize verifican primariamente
     el objetivo (consumo específico) y la factibilidad, con tolerancia holgada en setpoints."
  - "El fitness del GA tiene meseta plana cerca del óptimo (T_out clavada en 72.3 °C):
     individuos con setpoints distintos pueden tener fitness casi idéntico, lo que amplifica
     la sensibilidad de los setpoints exactos a diferencias numéricas mínimas."
  - "requirements.txt está en UTF-8/LF correcto (sin el problema de encoding UTF-16LE de otros
     entregables), pero fija torch==2.5.1+cu121 con --extra-index-url de PyTorch CUDA 12.1.
     Para el plugin se usa la build CPU (torch==2.5.1); la memoria advierte que las métricas
     pueden variar ~1% entre CPU y CUDA."
  - "La memoria menciona 'DEAP: ejecución del algoritmo NSGA-II' en la sección de librerías,
     pero la versión final operativa es un GA mono-objetivo con HallOfFame(1) (v4) — el texto
     de librerías quedó desactualizado de iteraciones anteriores. El código entregado
     (src/predict/optimization.py) es inequívocamente mono-objetivo."
  - "R² de T_out_leche = 0.3759 es bajo por diseño (variable regulada por PID/supervisor con
     sigma≈0.08 °C, varianza casi nula); la memoria y el README indican usar el MAE (0.047 °C)
     como métrica informativa para esa variable. No es un defecto del modelo."
  - "El train() original re-genera los splits desde data/processed/final_data_sim.csv y
