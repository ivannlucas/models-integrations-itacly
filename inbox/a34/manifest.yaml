model_id: ml34_dairy_pasteurization_energy_ga
sector: lacteo
nombre: "Modelo basado en algoritmos genéticos para la reducción del consumo energético del proceso de pasteurización"
task_type: regression_prescriptive  # MLP surrogate (E_consumo, T_out_leche) + GA mono-objetivo v4 (min E/F, DEAP)
framework:
  - torch==2.5.1          # el entregable fija 2.5.1+cu121; en el plugin se usa la build CPU equivalente
  - deap==1.4.3
  - scikit-learn==1.7.2
  - joblib==1.5.3
  - numpy==2.2.6
  - pandas==2.3.3

artifacts:
  folder: models/artifacts/
  files:
    - mlp_predictor.pt    # state_dict DynamicMLP 5→64→64→64→2, ReLU (según model_config.json)
    - model_config.json   # topología + features_in_order + targets_in_order
    - scaler_X.pkl        # MinMaxScaler [0,1] ajustado solo sobre train (5 features)
    - scaler_y.pkl        # MinMaxScaler [0,1] ajustado solo sobre train (2 targets)

inputs:
  # Variables no controlables (estado de planta) — necesarias en predict y en optimize
  fixed:
    - name: T_in_leche
      type: float
      unit: "°C"
      description: "Temperatura de entrada de la leche cruda (perturbación estacional)"
      train_range: [0.0, 7.98]
    - name: t_ciclo
      type: float
      unit: min
      description: "Tiempo acumulado desde la última limpieza CIP"
      train_range: [5.0, 545.0]
    - name: Delta_P
      type: float
      unit: bar
      description: "Caída de presión en el intercambiador (proxy de fouling)"
      train_range: [0.263, 0.906]

  # Variables de control/decisión — en modo predict las aporta el cliente;
  # en modo optimize las resuelve el GA dentro de ga_range
  control:
    - name: F_flow
      type: float
      unit: "L/h"
      description: "Caudal volumétrico de leche (límite operativo de bomba)"
      ga_range: [3500.0, 5500.0]
      train_range: [3520.84, 5500.0]
    - name: T_servicio
      type: float
      unit: "°C"
      description: "Temperatura del fluido de servicio (límite de caldera)"
      ga_range: [76.0, 95.0]
      train_range: [77.82, 85.17]

  # No hay campos derivados: el código original exige las 5 features en predict
  # y las 3 no controlables en optimize, sin defaults.
  derived_if_missing: {}

outputs:
  # Modo predict: inferencia directa del MLP surrogate (orden de features de model_config.json:
  # [T_in_leche, F_flow, T_servicio, t_ciclo, Delta_P])
  predict_inline:
    - name: E_consumo_pred
      type: float
      unit: kW
      description: "Consumo energético total predicho (térmico + bombeo + fijo)"
    - name: T_out_pred
      type: float
      unit: "°C"
      description: "Temperatura de salida de la leche predicha"

  # Modo optimize: GA mono-objetivo v4 por escenario (DEAP, HallOfFame(1)),
  # min E_consumo/F_flow con penalización si T_out < 72.3 °C
  optimize:
    - name: IA_F_flow
      type: float
      unit: "L/h"
      description: "Setpoint óptimo de caudal recomendado"
    - name: IA_T_servicio
      type: float
      unit: "°C"
      description: "Setpoint óptimo de temperatura de servicio recomendado"
    - name: IA_E_consumo
      type: float
      unit: kW
      description: "Consumo predicho por el MLP con los setpoints IA"
    - name: IA_T_out
      type: float
      unit: "°C"
      description: "Temperatura de salida predicha con los setpoints IA"
    - name: IA_consumo_especifico
      type: float
      unit: "kW/(L/h)"
      description: "Consumo específico IA_E_consumo / IA_F_flow (KPI principal)"
    - name: IA_factible
      type: bool
      description: "True si IA_T_out >= 72.3 °C (restricción de seguridad alimentaria)"
    - name: fitness_final
      type: float
      description: "Fitness del mejor individuo (HallOfFame(1)) al final del GA"

training:
  supported: true
  # El modelo es multi-output: el código de entrenamiento (src/main.py::train,
  # src/training/trainer.py) entrena las 2 columnas objetivo a la vez con MSELoss conjunta.
  target_column: [E_consumo, T_out_leche]
  required_columns: [T_in_leche, F_flow, T_servicio, t_ciclo, Delta_P, E_consumo, T_out_leche]
  hyperparams:
    # De models/artifacts/model_config.json (búsqueda aleatoria en predict_model_t_h.ipynb,
    # "no volver a ejecutar la búsqueda" según README) + settings fijos de src/main.py::train
    num_layers: 3
    neurons: 64
    activation: ReLU
    optimizer: Adam
    lr: 0.0005
    epochs_max: 300
    batch_size: 128
    early_stopping_patience: 15
    loss: MSELoss
    normalization: "MinMaxScaler [0,1] ajustado solo sobre train"
    seed: 1
  metrics_returned: [rmse_E_consumo, mae_E_consumo, r2_E_consumo, rmse_T_out_leche, mae_T_out_leche, r2_T_out_leche]
  source: codigo_entrenamiento  # src/main.py::train + src/training/trainer.py + model_config.json

constraints:
  T_out_min_celsius: 72.3
  F_flow_bounds: [3500.0, 5500.0]
  T_servicio_bounds: [76.0, 95.0]
  descripcion: >
    Restricción de seguridad alimentaria HTST: límite legal 72.0 °C (Codex CXC 57-2004)
    + margen de +0.3 °C por incertidumbre de sensor PT100 Clase A (IEC 60751) y tolerancia
    PMO-FDA. En el GA se aplica como penalización de fitness
    (10000 + (E/F) * (1 + 10 * déficit)), no como rechazo duro. El plugin debe exponer la
    factibilidad (IA_factible) y lanzar excepción de dominio si el GA no encuentra
    solución factible para un escenario.

# GA config (DEAP, mono-objetivo v4 — src/utils/constants.py GA_DEFAULT_CONFIG y
# src/predict/optimization.py)
ga_config:
  pop_size: 150
  n_gen: 15               # convergencia P95 = 7-8 gen + margen (tuning_params_ga_v4.ipynb)
  cxpb: 0.8               # cruce cxBlend alpha=0.5
  mutpb: 0.2              # mutación mutGaussian mu=0 sigma=0.2 indpb=0.2
  selection: "torneo (tournsize=3), supervivencia mu+lambda sobre pop+offspring"
  elitism: "HallOfFame(1)"
  penalty_factor: 10.0
  seed_strategy: "seed = seed_base + indice_de_fila (seed_base=1); determinista por escenario"

metrics_reported:
  # --- MLP surrogate (models/metrics/train_metrics.json, bloque test — coincide con
  # memoria Tabla 9 y README) ---
  dataset: test_hold_out_temporal_por_cuartiles
  split: 70/15/15
  random_seed: 1
  n_samples_test: 7708
  E_consumo:
    rmse_kw: 5.3838
    mae_kw: 4.2571
    r2: 0.9779
  T_out_leche:
    rmse_c: 0.0643
    mae_c: 0.0473
    r2: 0.3759   # bajo por varianza casi nula de la variable regulada (sigma≈0.08 °C); el MAE es la métrica informativa
  # --- GA backtesting en tiempo real sobre test completo (7708 escenarios) ---
  # FUENTE DE VERDAD (decisión del propietario, 2026-07-10): el artefacto entregado
  # models/metrics/evaluation_rt_backtesting_report.json. La memoria v2.0 (Tabla 10) y el
  # README citan un run anterior con cifras distintas — ver known_issues.
  ga_backtesting:
    fuente: models/metrics/evaluation_rt_backtesting_report.json
    pct_escenarios_factibles: 100.0
    ahorro_consumo_absoluto_pct: 1.78
    delta_caudal_pct: 10.62
    mejora_consumo_especifico_pct: 11.73
    consumo_especifico_hist: 0.088448
    consumo_especifico_ia: 0.07807
    cumplimiento_T_out_hist_pct: 99.4
    cumplimiento_T_out_ia_pct: 100.0
    tiempo_medio_por_escenario_ms: 416.5
  criterios_exito:
    cumplimiento_T_out_min_pct: 100.0   # cumplido (100.0)
    mejora_consumo_especifico_min_pct: 3.0  # cumplido (11.73)

# 15 casos predict extraídos de data/splits/test.csv (filas variadas cubriendo todo el rango
