# ── Known issues / gotchas ───────────────────────────────────────────────────
known_issues:
  - "El manifest no venía en el repo; se generó a posteriori (plugin ya integrado). El model_id runtime del plugin es m47-dnsl-... y la carpeta de artefactos a47_dnsl_..."
  - "test_split.csv usa el Cycle_ID original del dataset (20,23,29...); prediction_output.csv entregado usa un índice reindexado 0..2204 y NO es alineable directamente con el split — por eso los golden se capturaron ejecutando el modelo sobre el split, no leyendo prediction_output.csv."
  - "Golden capturados en GPU/CUDA (torch 2.1.2+cu121). En CPU las CLASES deben reproducirse; las confianzas pueden diferir en decimales. El versionado de CUDA puede alterar levemente la reproducibilidad numérica (advertido en la memoria)."
  - "scaler_cnn_dns.pkl se serializó con scikit-learn 1.6.1; el entorno local tiene 1.7.0 — carga con warnings de versión pero funciona. Fijar versión en verificación si se busca reproducción estricta."
  - "El dataset es de laboratorio (banco hidráulico UCI, fluido = aceite), NO de pasteurizado lácteo real. Todas las métricas son optimistas respecto a producción; el modelo requiere reentrenamiento/calibración con datos de planta antes de desplegar."
  - "No existe outputs/a47/verification_report.md — el modelo aún no ha pasado el skill verification contra estos golden cases."
